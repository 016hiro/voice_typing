included:
  - Sources
  - Tests

excluded:
  - .build
  - Packages

disabled_rules:
  - identifier_name
  - line_length
  - vertical_parameter_alignment
  - inclusive_language
  - type_body_length
  - nesting
  - type_name

opt_in_rules:
  - empty_count
  - closure_spacing
  - unused_optional_binding
  - for_where

function_body_length:
  warning: 200
  error: 300

file_length:
  warning: 2000
  error: 3000

cyclomatic_complexity:
  warning: 22
  error: 35

function_parameter_count:
  warning: 9
  error: 12
