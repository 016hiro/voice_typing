name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    # macos-15 is arm64 (Apple Silicon) with Xcode 16 / Swift 6 as default.
    # macos-14 ships Swift 5.10, which can't parse our `swift-tools-version: 6.0`
    # Package.swift. Public repos get this runner free.
    # Debug build only: we don't install Metal Toolchain in CI, and we don't
    # compile the MLX metallib here. Goal is a compile smoke test — catch
    # obvious breakage (missing imports, syntax errors, Swift 6 concurrency
    # regressions) before landing on main. Actual release artifacts are
    # built locally via `make build`.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build/checkouts
            .build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: swift build -c debug
        run: swift build -c debug --arch arm64

      - name: swift test --skip E2E
        # Runs unit tests only. E2E tests require Qwen model weights (~1.4 GB)
        # and MLX metallib staging — both out of scope for a free CI runner.
        # Local devs get full coverage via `make test-e2e`.
        env:
          VT_FIXTURE_ROOT: ${{ github.workspace }}/Tests/Fixtures
        run: swift test --skip E2E --arch arm64
