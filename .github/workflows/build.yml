name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    # macos-26-arm64: Xcode 26.2 / Swift 6.3 default — picked to match the
    # typical dev box. Earlier we ran on macos-15 (Xcode 16 / Swift 6.1.2)
    # which still rejected the `@MainActor XCTestCase + try await super.setUp`
    # pattern as a Swift 6 strict-concurrency false positive; Swift 6.3 has
    # since fixed it. Local-vs-CI toolchain drift was letting our Stop hook
    # gate (which runs against local Swift) green-light pushes that CI
    # rejected — see commits 94a256a, 49cf4f4, 3e32d40 for the cleanup.
    #
    # Debug build only: we don't install Metal Toolchain in CI, and we don't
    # compile the MLX metallib here. Goal is a compile smoke test — catch
    # obvious breakage (missing imports, syntax errors, Swift 6 concurrency
    # regressions) before landing on main. Actual release artifacts are
    # built locally via `make build`.
    runs-on: macos-26-arm64
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build/checkouts
            .build/repositories
          # Cache key includes the runner image tag — when we bumped from
          # macos-15 to macos-26 the SwiftPM artifact format changed enough
          # that restoring the old cache caused link errors. Always include
          # the runner-image identifier in the key.
          key: spm-macos-26-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-macos-26-

      - name: swift build -c debug
        run: swift build -c debug --arch arm64

      - name: swift test --skip E2E
        # Runs unit tests only. E2E tests require Qwen model weights (~1.4 GB)
        # and MLX metallib staging — both out of scope for a free CI runner.
        # Local devs get full coverage via `make test-e2e`.
        env:
          VT_FIXTURE_ROOT: ${{ github.workspace }}/Tests/Fixtures
        run: swift test --skip E2E --arch arm64
