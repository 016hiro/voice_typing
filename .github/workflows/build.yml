name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    # macos-15 (arm64) ships Xcode 16 / Swift 6.1.2. Tried macos-26-arm64 in
    # 6cda857 to match local Swift 6.3.1 and close the toolchain gap, but the
    # macos-26 runner pool was still capacity-starved — jobs sat queued for
    # 10+ hours. Reverted. Living with the toolchain gap: when local Swift is
    # ahead of CI, our Stop hook can green-light a push that CI then rejects
    # (rare; first incident in this project's history). Acceptable risk; fix
    # by aligning the offending code to CI's stricter check when it bites.
    # Future option if this becomes painful: install Xcode 16.4 alongside
    # locally and pin the hook to it via DEVELOPER_DIR.
    #
    # Debug build only: we don't install Metal Toolchain in CI, and we don't
    # compile the MLX metallib here. Goal is a compile smoke test — catch
    # obvious breakage (missing imports, syntax errors, Swift 6 concurrency
    # regressions) before landing on main. Actual release artifacts are
    # built locally via `make build`.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build/checkouts
            .build/repositories
          # Include the runner image tag in the key — the macos-15 → macos-26
          # bump-and-revert showed SwiftPM artifacts aren't portable across
          # toolchain versions. Restoring a stale cross-toolchain cache produces
          # link errors that look like real failures.
          key: spm-macos-15-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-macos-15-

      - name: swift build -c debug
        run: swift build -c debug --arch arm64

      - name: swift test --skip E2E
        # Runs unit tests only. E2E tests require Qwen model weights (~1.4 GB)
        # and MLX metallib staging — both out of scope for a free CI runner.
        # Local devs get full coverage via `make test-e2e`.
        env:
          VT_FIXTURE_ROOT: ${{ github.workspace }}/Tests/Fixtures
        run: swift test --skip E2E --arch arm64
